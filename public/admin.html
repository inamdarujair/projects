<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC-SS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body id="admin-app">
  <header class="header">
    <div class="header-content">
      <h1>⚙️PC-SS</h1>
      <p class="header-subtitle">Manage Components & Configurations</p>
    </div>
            <nav>
              <a class="neon-link" href="/" title="Back to User Panel">
                <span>🏠</span> User Panel
              </a>
              <a id="profile-link" class="neon-link" href="/profile.html" title="Your Profile" style="display:none;">
                <span>👤</span> Profile
              </a>
              <a id="logout-link" class="neon-link" href="#" title="Sign out" style="display:none;">
                <span>🚪</span> Logout
              </a>
            </nav>
  </header>

  <main class="container admin-container">
    <section class="panel admin-config">
      <h2>🔐 Admin</h2>
      <div id="admin-identity" class="rows"></div>
    </section>

    <section class="panel admin-form">
      <h2>➕ Add / Edit Component</h2>
      <form id="component-form">
        <input type="hidden" id="comp-id" />
        <div class="row">
          <label for="comp-name">📝 Name</label>
          <input type="text" id="comp-name" required />
        </div>
        <div class="row">
          <label for="comp-category">📂 Category</label>
          <select id="comp-category" required></select>
        </div>
        <div class="row">
          <label for="comp-price">💰 Price (₹)</label>
          <input type="number" id="comp-price" step="0.01" min="0" required />
        </div>
        <div class="row">
          <label for="comp-socket">🔌 Socket (optional)</label>
          <input type="text" id="comp-socket" placeholder="e.g., LGA1700, AM4" />
        </div>
        <div class="row">
          <label for="comp-specs">⚙️ Specs (JSON)</label>
          <textarea id="comp-specs" rows="5" placeholder='{"wattage":650, "type":"DDR4"}'></textarea>
        </div>
        <div class="row actions">
          <button type="submit" class="btn-primary">💾 Save Component</button>
          <button type="button" id="reset-form" class="btn-secondary">🔄 Reset</button>
        </div>
      </form>
    </section>

    <section class="panel admin-list">
      <h2>📋 Components</h2>
      <div id="components-table" class="components-table"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>&copy; 2026 PC-SS</p>
      <div class="footer-links">
        <a href="/" class="footer-link">🏠 User Panel</a>
        <a href="/privacy.html" class="footer-link">🔒 Privacy Policy</a>
        <a href="/support.html" class="footer-link">🆘 Support</a>
      </div>
    </div>
  </footer>

  <script src="assets/js/app.js" defer></script>
</body>
</html>
